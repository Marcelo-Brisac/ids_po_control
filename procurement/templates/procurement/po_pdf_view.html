{% extends "procurement/base.html" %}

{% block title %}PDF - PO {{ po.po_number }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>PO {{ po.po_number }} - PDF Preview</h1>
    <a href="{% url 'po_detail' po.pk %}" class="btn btn-secondary">Back to PO</a>
</div>

<div class="pdf-container">
    <iframe src="{% url 'po_pdf' po.pk %}" width="100%" height="800px" style="border: 1px solid #ccc;"></iframe>
</div>
{% endblock %}
